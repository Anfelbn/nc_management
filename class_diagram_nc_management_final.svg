@startuml class_diagram_nc_management_final

title Diagramme de classes — Gestion des Non-Conformités (FNC / FAC)

skinparam classAttributeIconSize 0

skinparam class {
    BackgroundColor White
    BorderColor #2C3E50
    ArrowColor #2C3E50
    FontSize 13
    AttributeFontSize 12
}

skinparam package {
    BackgroundColor White
    BorderColor #5DADE2
    FontSize 16
    FontStyle bold
}

hide circle
hide empty members

package "Gestion des Non-Conformités (FNC / FAC)" {


abstract class AbstractFiche <<Abstract>> #EAEDED {
  + name
  + date
  + direction_id
  + analyse_causes
  + state
  + current_handler_uid
  + sent_by_id
  + date_envoi

  - -
  + action_envoyer() {abstract}
}


together {

class Nonconformity <<Model>> {

  + description
  + impact

  + type_nc_produit
  + type_autre_preciser

  + signale_par_id
  + date_signalement
  + fonction_visa

  + action_immediate
  + realise_par_id
  + date_realisation
  + trait_reprise

  + department_id
  + service_id
  + responsable_action_id

  + superieur_id
  + date_validation
  + signature

  - -
  + action_valider_fnc()
  + action_open_send_wizard()
  + action_open_number_wizard()
}

class CorrectiveAction <<Model>> {

  + fnc_id
  + ref_document
  + date_fnc
  + responsable_id

  + responsable_analyse_id
  + date_analyse
  + visa_analyse

  + description_actions
  + responsable_actions_id
  + date_actions
  + visa_actions

  + actions_efficaces
  + verification_efficacite
  + extension_possible

  + qse_nom_id
  + qse_date
  + qse_visa

  + cloture_par_id
  + date_cloture
  + visa_cloture

  - -
  + action_open_send_fac_wizard()
}

}


class ActionLine <<Model>> {

  + fac_id
  + action_description
  + date_prevue
  + date_realisation
  + responsable_id
  + direction_id
}

}


AbstractFiche <|- - Nonconformity
AbstractFiche <|- - CorrectiveAction

Nonconformity "1" -right- "0..*" CorrectiveAction : génère
CorrectiveAction "1" *- - "0..*" ActionLine : contient

@enduml

